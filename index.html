<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DFA Language Interpreter</title>
  <style>
    /* =====================================================================
       Paleta: Catppuccin Mocha (igual que el resaltado del tokenizador)
       ===================================================================== */
    :root {
      --base:      #1e1e2e;
      --mantle:    #181825;
      --crust:     #11111b;
      --surface0:  #313244;
      --surface1:  #45475a;
      --overlay0:  #6c7086;
      --overlay1:  #7f849c;
      --text:      #cdd6f4;
      --subtext:   #bac2de;
      --blue:      #89b4fa;
      --lavender:  #b4befe;
      --green:     #a6e3a1;
      --red:       #f38ba8;
      --peach:     #fab387;
      --yellow:    #f9e2af;
      --mauve:     #cba6f7;
      --teal:      #94e2d5;
      --sky:       #89dceb;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--base);
      color: var(--text);
      font-family: 'Courier New', 'Consolas', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Header ---- */
    header {
      background: var(--mantle);
      border-bottom: 1px solid var(--surface0);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 {
      color: var(--blue);
      font-size: 0.95rem;
      font-weight: normal;
      letter-spacing: 0.02em;
    }
    header .team {
      color: var(--overlay0);
      font-size: 0.72rem;
      margin-left: auto;
    }
    header .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 8px;
    }
    header .dot.off { background: var(--overlay0); }

    /* ---- Layout principal: dos columnas ---- */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ---- Paneles ---- */
    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .panel-left { border-right: 1px solid var(--surface0); }

    .panel-title {
      background: var(--mantle);
      border-bottom: 1px solid var(--surface0);
      padding: 7px 16px;
      font-size: 0.7rem;
      color: var(--overlay1);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* ---- Editor ---- */
    #code-editor {
      flex: 1;
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #code-input {
      flex: 1;
      background: var(--base);
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      line-height: 1.75;
      border: none;
      outline: none;
      padding: 16px 18px;
      resize: none;
      min-height: 0;
      tab-size: 4;
    }
    #code-input::placeholder { color: var(--overlay0); }

    /* ---- Seccion de cadenas de prueba ---- */
    .test-section {
      border-top: 1px solid var(--surface0);
      background: var(--mantle);
      padding: 10px 16px 0 16px;
      flex-shrink: 0;
    }
    .test-section label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--overlay1);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 7px;
    }
    .test-section label span.badge {
      background: var(--surface0);
      color: var(--subtext);
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 10px;
      text-transform: none;
      letter-spacing: 0;
    }
    #test-input {
      width: 100%;
      background: var(--crust);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      line-height: 1.6;
      border: 1px solid var(--surface0);
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      outline: none;
      padding: 8px 12px;
      resize: none;
      height: 68px;
      transition: border-color 0.2s;
    }
    #test-input:focus { border-color: var(--blue); }
    #test-input::placeholder { color: var(--overlay0); }

    /* ---- Toolbar ---- */
    .toolbar {
      background: var(--mantle);
      border-top: 1px solid var(--surface0);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #run-btn {
      background: var(--blue);
      color: var(--crust);
      border: none;
      border-radius: 4px;
      padding: 7px 22px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.15s, transform 0.1s;
    }
    #run-btn:hover  { opacity: 0.88; }
    #run-btn:active { transform: scale(0.97); }
    #run-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .kbd-hint {
      color: var(--overlay0);
      font-size: 0.72rem;
    }
    kbd {
      background: var(--surface0);
      color: var(--subtext);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 0.7rem;
    }

    /* ---- Panel de salida ---- */
    .output-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #output-panel {
      flex: 1;
      padding: 16px 18px;
      font-size: 0.87rem;
      line-height: 1.6;
    }

    #output-placeholder {
      color: var(--overlay0);
      font-style: italic;
      padding: 8px 0;
    }

    #diagram-panel {
      border-top: 1px solid var(--surface0);
      padding: 14px 18px;
      display: none;
      flex-shrink: 0;
    }
    #diagram-panel img {
      max-width: 100%;
      border-radius: 6px;
      background: #fff;
      display: block;
    }

    /* =====================================================================
       Clases CSS de tokens — deben coincidir exactamente con styler en
       tokenizer.rkt y con html-generator.rkt (css-estilos).
       ===================================================================== */

    /* Bloques contenedores (generados por make-result-content) */
    .code-block {
      background: var(--crust);
      border: 1px solid var(--surface0);
      border-radius: 6px;
      padding: 14px 18px;
      margin: 8px 0;
      line-height: 2.1;
      overflow-x: auto;
      word-break: break-all;
    }
    .sim-block {
      background: var(--crust);
      border: 1px solid var(--surface0);
      border-radius: 6px;
      padding: 12px 18px;
      margin: 8px 0;
    }

    /* Encabezados de seccion (inyectados via innerHTML por make-result-content) */
    #output-panel h2 {
      color: var(--blue);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--surface0);
      padding-bottom: 5px;
      margin: 18px 0 8px 0;
    }
    #output-panel h2:first-child { margin-top: 0; }

    /* Clases de tokens (deben coincidir con el cond de styler) */
    .keyword     { color: var(--mauve); font-style: italic; font-weight: bold; }
    .stateId     { color: var(--green); font-weight: bold; }
    .transition  { color: var(--sky); }
    .string      { color: var(--yellow); }
    .assignation { color: var(--red); }
    .comma       { color: var(--text); }
    .semicolon   { color: var(--red); }
    .braces      { color: var(--peach); }
    .comment     { color: var(--overlay0); font-style: italic; }
    .lex-error   {
      color: var(--red);
      background: rgba(243, 139, 168, 0.12);
      border-radius: 3px;
      padding: 0 4px;
      outline: 1px solid rgba(243, 139, 168, 0.4);
    }

    /* Resultados de simulacion */
    .resultado-ok   { color: var(--green); font-weight: bold; }
    .resultado-fail { color: var(--red);   font-weight: bold; }

    /* Mensajes de error sintactico / lexico */
    .error-msg {
      color: var(--red);
      background: rgba(243, 139, 168, 0.08);
      border-left: 3px solid var(--red);
      padding: 5px 12px;
      margin: 4px 0;
      border-radius: 0 4px 4px 0;
      font-size: 0.83rem;
    }

    /* Encabezado del diagrama */
    #diagram-panel h2 {
      color: var(--blue);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--surface0);
      padding-bottom: 5px;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>
  <!-- ================================================================
       Header
       ================================================================ -->
  <header>
    <span class="dot" id="status-dot"></span>
    <h1>// DFA Language Interpreter</h1>
    <span class="team">
      Ivan Burrola &nbsp;·&nbsp; Alberto López &nbsp;·&nbsp;
      Axel Lugo &nbsp;·&nbsp; Sebastian Viche
    </span>
  </header>

  <!-- ================================================================
       Workspace: editor (izquierda) | resultado (derecha)
       ================================================================ -->
  <div class="workspace">

    <!-- ---- Panel izquierdo: editor ---- -->
    <div class="panel panel-left">
      <div class="panel-title">Editor — DFA Language</div>

      <div id="code-editor">
        <textarea
          id="code-input"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          placeholder="Escribe tu descripcion DFA aqui..."
        >// AFD: acepta cadenas que terminan en 'b'
states: {q0, q1};
alphabet: {'a', 'b'};
start_state: {q0};
final_state: {q1};
transitions:
    q0 -> {'a'} -> q0,
    q0 -> {'b'} -> q1,
    q1 -> {'a'} -> q0,
    q1 -> {'b'} -> q1;
check: {'ab', 'b', 'a', 'aba', 'abb'};</textarea>
      </div>

      <!-- Cadenas de prueba adicionales -->
      <div class="test-section">
        <label>
          Cadenas de prueba adicionales
          <span class="badge">una por línea · sin comillas</span>
        </label>
        <textarea
          id="test-input"
          spellcheck="false"
          placeholder="ab&#10;ba&#10;abba"
        ></textarea>
      </div>

      <!-- Barra de acciones -->
      <div class="toolbar">
        <button id="run-btn" onclick="run()">&#9654; Ejecutar</button>
        <span class="kbd-hint"><kbd>Ctrl</kbd> + <kbd>Enter</kbd></span>
      </div>
    </div>

    <!-- ---- Panel derecho: resultado ---- -->
    <div class="panel">
      <div class="panel-title">Resultado</div>

      <div class="output-wrap">
        <div id="output-panel">
          <div id="output-placeholder">// El resultado aparecerá aquí</div>
        </div>

        <!-- Diagrama del automata (visible solo si Graphviz esta disponible) -->
        <div id="diagram-panel">
          <h2>&#9654; Diagrama del Autómata</h2>
          <img id="diagram-img" src="" alt="Diagrama del autómata">
        </div>
      </div>
    </div>
  </div>

  <!-- ================================================================
       JavaScript
       ================================================================ -->
  <script>
    const dot    = document.getElementById('status-dot');
    const runBtn = document.getElementById('run-btn');
    const output = document.getElementById('output-panel');
    const diagramPanel = document.getElementById('diagram-panel');
    const diagramImg   = document.getElementById('diagram-img');

    // Ctrl+Enter ejecuta desde el editor
    document.getElementById('code-input').addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        run();
      }
    });

    async function run() {
      const code    = document.getElementById('code-input').value;
      const testStr = document.getElementById('test-input').value;

      // Estado: procesando
      runBtn.disabled  = true;
      runBtn.textContent = '⟳ Procesando…';
      dot.className    = 'dot off';
      output.innerHTML = "<div style='color:var(--overlay0);font-style:italic;'>// Procesando...</div>";
      diagramPanel.style.display = 'none';

      try {
        const response = await fetch('/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input: code, test: testStr })
        });

        if (!response.ok) {
          throw new Error('HTTP ' + response.status + ': ' + response.statusText);
        }

        const data = await response.json();

        // Insertar HTML del resultado
        output.innerHTML = data.resultado || "<div class='error-msg'>Respuesta vacía del servidor.</div>";

        // Mostrar diagrama si se generó
        if (data.imagen && data.imagen.trim().length > 0) {
          diagramImg.src         = 'data:image/png;base64,' + data.imagen;
          diagramPanel.style.display = 'block';
        } else {
          diagramPanel.style.display = 'none';
        }

        dot.className = 'dot'; // verde = OK

      } catch (err) {
        output.innerHTML =
          "<div class='error-msg'>&#9888; Error al conectar con el servidor: "
          + escapeHtml(err.message) + "</div>"
          + "<div style='color:var(--overlay0);font-size:0.8rem;margin-top:8px;'>"
          + "Asegúrate de que servlet.rkt está corriendo en el puerto 8000.</div>";
        dot.className = 'dot off';
      } finally {
        runBtn.disabled     = false;
        runBtn.innerHTML    = '&#9654; Ejecutar';
      }
    }

    // Escapar HTML para mensajes de error seguros
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
